name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          for file in index.html styles.css script.js PLAN.md README.md; do
            if [ -f "$file" ]; then
              echo "  ✓ $file"
            else
              echo "  ✗ $file is MISSING"
              exit 1
            fi
          done

      - name: Validate HTML structure
        run: |
          grep -q '<!DOCTYPE html>' index.html && echo "  ✓ DOCTYPE"
          grep -q '<html'          index.html && echo "  ✓ html tag"
          grep -q 'styles.css'     index.html && echo "  ✓ styles.css linked"
          grep -q 'script.js'      index.html && echo "  ✓ script.js linked"
          grep -q 'viewport'       index.html && echo "  ✓ viewport meta"

      - name: Check link count
        run: |
          count=$(grep -c 'class="link-btn"' index.html)
          echo "  Found $count link buttons"
          [ "$count" -ge 10 ] || { echo "  ✗ Expected at least 10 links"; exit 1; }
          echo "  ✓ Link count OK"

  deploy:
    name: Deploy to GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print live URL
        run: echo "Live URL: ${{ steps.deployment.outputs.page_url }}"
